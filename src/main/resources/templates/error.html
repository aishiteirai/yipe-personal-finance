<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
    <div class="text-center py-5">
        <i class="bi bi-exclamation-triangle" style="font-size: 4rem; color: var(--yipe-warning);"></i>
        <h1 class="display-1 fw-bold" th:text="${status}">404</h1>
        <p class="fs-4 text-secondary" th:text="${message}">Página não encontrada.</p>
        <p class="text-secondary small" th:if="${path}">
            Caminho: <span th:text="${path}"></span>
        </p>
        <a th:href="@{/dashboard}" class="btn btn-primary mt-3"><i class="bi bi-arrow-left"></i> Voltar ao Dashboard</a>
    </div>
</div>
</body>
</html>
