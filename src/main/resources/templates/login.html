<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — YIPE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1d23; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #2b3035; border: 1px solid #495057; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 400px; }
        .login-card h1 { color: #fff; text-align: center; margin-bottom: 0.25rem; }
        .login-card .subtitle { color: #6c757d; text-align: center; margin-bottom: 2rem; }
        .form-label { color: #adb5bd; }
        .form-control { background: #1a1d23; border-color: #495057; color: #fff; }
        .form-control:focus { background: #1a1d23; border-color: #0d6efd; color: #fff; box-shadow: 0 0 0 0.2rem rgba(13,110,253,.25); }
        .btn-login { width: 100%; padding: 0.6rem; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>⚡ YIPE</h1>
        <p class="subtitle">Controle Financeiro</p>

        <div th:if="${param.error}" class="alert alert-danger">Usuário ou senha inválidos.</div>
        <div th:if="${param.logout}" class="alert alert-info">Você foi desconectado.</div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login">Entrar</button>
        </form>
    </div>
</body>
</html>
