<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — YIPE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/yipe.css}">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="login-card text-center" style="max-width: 400px; width: 100%; padding: 2.5rem;">
        <div class="mb-3">
            <i class="bi bi-lightning-fill" style="font-size: 2.5rem; color: var(--yipe-accent);"></i>
            <h1 class="h3 mt-2">YIPE</h1>
            <p class="text-secondary">Controle Financeiro</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>Usuário ou senha inválidos.</span>
        </div>
        <div th:if="${param.logout}" class="alert alert-info d-flex align-items-center gap-2">
            <i class="bi bi-info-circle-fill"></i>
            <span>Você foi desconectado.</span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3 text-start">
                <label class="form-label">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
            </div>
            <div class="mb-3 text-start" x-data="{ show: false }">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input :type="show ? 'text' : 'password'" name="password" class="form-control" required>
                    <button class="btn btn-outline-secondary" type="button" @click="show = !show">
                        <i :class="show ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </button>
        </form>
    </div>
</body>
</html>
