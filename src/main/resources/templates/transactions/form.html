<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
    <h1>Novo Lançamento</h1>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form th:action="@{/transactions}" th:object="${dto}" method="post" class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Tipo de Movimentação</label>
            <select th:field="*{tipo}" class="form-select" id="tipoSelect" onchange="onTipoChange()"
                    th:classappend="${#fields.hasErrors('tipo')} ? 'is-invalid' : ''">
                <option th:each="t : ${tipos}" th:value="${t}" th:text="${t.displayName}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{tipo}"></div>
        </div>

        <div class="col-md-6">
            <label class="form-label">Valor (R$)</label>
            <input type="number" step="0.01" min="0" th:field="*{valor}" class="form-control" required
                   th:classappend="${#fields.hasErrors('valor')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{valor}"></div>
        </div>

        <div class="col-md-6">
            <label class="form-label">Data</label>
            <input type="date" th:field="*{data}" class="form-control" required
                   th:classappend="${#fields.hasErrors('data')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{data}"></div>
        </div>

        <div class="col-md-6">
            <label class="form-label">Descrição</label>
            <input type="text" th:field="*{descricao}" class="form-control" required
                   th:classappend="${#fields.hasErrors('descricao')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{descricao}"></div>
        </div>

        <div class="col-md-6" id="contaGroup">
            <label class="form-label">Conta de Origem/Destino</label>
            <select th:field="*{conta}" class="form-select">
                <option th:each="c : ${contas}" th:value="${c.nome}" th:text="${c.nome}"></option>
            </select>
        </div>

        <div class="col-md-6" id="cartaoGroup" style="display:none">
            <label class="form-label">Selecione o Cartão</label>
            <select th:field="*{conta}" class="form-select">
                <option th:each="c : ${cartoes}" th:value="${c.nome}" th:text="${c.nome}"></option>
            </select>
        </div>

        <div class="col-md-6">
            <label class="form-label">Categoria</label>
            <select th:field="*{categoria}" class="form-select" id="categoriaSelect">
                <option th:each="cat : ${categorias}" th:value="${cat.nome}" th:text="${cat.nome}"></option>
            </select>
        </div>

        <div class="col-12">
            <div class="form-check">
                <input type="checkbox" th:field="*{recorrente}" class="form-check-input" id="recorrenteCheck"
                       onchange="onRecorrenteChange()">
                <label class="form-check-label" for="recorrenteCheck">Gasto Frequente / Parcelado / Assinatura?</label>
            </div>
        </div>

        <div class="col-md-6" id="tipoRecorrenciaGroup" style="display:none">
            <label class="form-label">Como se repete?</label>
            <div class="form-check">
                <input class="form-check-input" type="radio" th:field="*{tipoRecorrencia}" value="parcelado" id="tipoParcelado">
                <label class="form-check-label" for="tipoParcelado">Parcelado (Tem fim)</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" th:field="*{tipoRecorrencia}" value="mensal" id="tipoMensal">
                <label class="form-check-label" for="tipoMensal">Mensal (Sem fim definido)</label>
            </div>
        </div>

        <div class="col-md-6" id="qtdMesesGroup" style="display:none">
            <label class="form-label">Repetir por quantos meses?</label>
            <input type="number" th:field="*{qtdMeses}" min="2" max="60" class="form-control">
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-primary">Salvar Lançamento</button>
        </div>
    </form>
</div>

<script>
    function onTipoChange() {
        const tipo = document.getElementById('tipoSelect').value;
        const contaGroup = document.getElementById('contaGroup');
        const cartaoGroup = document.getElementById('cartaoGroup');
        const catSelect = document.getElementById('categoriaSelect');

        if (tipo === 'CREDIT') {
            contaGroup.style.display = 'none';
            cartaoGroup.style.display = 'block';
        } else if (tipo === 'VR') {
            contaGroup.style.display = 'block';
            cartaoGroup.style.display = 'none';
        } else {
            contaGroup.style.display = 'block';
            cartaoGroup.style.display = 'none';
        }
    }

    function onRecorrenteChange() {
        const checked = document.getElementById('recorrenteCheck').checked;
        document.getElementById('tipoRecorrenciaGroup').style.display = checked ? 'block' : 'none';
        document.getElementById('qtdMesesGroup').style.display = checked ? 'block' : 'none';
    }
</script>
</body>
</html>
