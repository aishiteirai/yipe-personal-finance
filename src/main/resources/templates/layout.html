<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE — YIPE">YIPE | Controle Financeiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/yipe.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar-wrapper">
            <div class="sidebar-heading">⚡ YIPE</div>
            <div class="list-group list-group-flush">
                <a th:classappend="${#httpServletRequest.requestURI.startsWith('/dashboard')} ? 'active' : ''"
                   th:href="@{/dashboard}" class="list-group-item list-group-item-action">📊 Dashboard</a>
                <a th:classappend="${#httpServletRequest.requestURI.startsWith('/transactions')} ? 'active' : ''"
                   th:href="@{/transactions}" class="list-group-item list-group-item-action">💸 Lançamentos</a>
                <a th:classappend="${#httpServletRequest.requestURI.startsWith('/statement')} ? 'active' : ''"
                   th:href="@{/statement}" class="list-group-item list-group-item-action">📜 Extrato</a>
                <a th:classappend="${#httpServletRequest.requestURI.startsWith('/invoices')} ? 'active' : ''"
                   th:href="@{/invoices}" class="list-group-item list-group-item-action">💳 Faturas</a>
                <a th:classappend="${#httpServletRequest.requestURI.startsWith('/budget')} ? 'active' : ''"
                   th:href="@{/budget}" class="list-group-item list-group-item-action">🎯 Planejamento</a>
                <a th:classappend="${#httpServletRequest.requestURI.startsWith('/settings')} ? 'active' : ''"
                   th:href="@{/settings}" class="list-group-item list-group-item-action">⚙️ Configurações</a>
                <a th:classappend="${#httpServletRequest.requestURI.startsWith('/import-export')} ? 'active' : ''"
                   th:href="@{/import-export}" class="list-group-item list-group-item-action">📁 Importar/Exportar</a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <div class="container-fluid p-4">
                <th:block layout:fragment="content">
                    <p>Placeholder — override in child template.</p>
                </th:block>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
