<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE — YIPE">YIPE | Controle Financeiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/yipe.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body>
    <div class="d-flex" id="wrapper" x-data="{ sidebarOpen: false }">
        <!-- Sidebar toggle -->
        <button class="btn btn-link sidebar-toggle"
                x-show="!sidebarOpen"
                @click="sidebarOpen = !sidebarOpen"
                aria-label="Toggle sidebar">
            <i class="bi-list"></i>
        </button>

        <!-- Sidebar overlay -->
        <div class="sidebar-overlay"
             x-show="sidebarOpen"
             @click="sidebarOpen = false"
             x-transition.opacity></div>

        <!-- Sidebar -->
        <div class="sidebar d-flex flex-column"
             :class="{ 'show': sidebarOpen }"
             id="sidebar-wrapper">
            <div class="sidebar-heading">
                <i class="bi bi-lightning-fill"></i> YIPE
                <button class="btn btn-sm p-0 ms-auto border-0 text-secondary sidebar-close"
                        @click="sidebarOpen = false" aria-label="Close sidebar">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <nav class="list-group list-group-flush">
                <a th:classappend="${activePage == 'dashboard'} ? 'active' : ''"
                   th:href="@{/dashboard}" class="list-group-item list-group-item-action">
                    <i class="bi bi-bar-chart-fill"></i> Dashboard
                </a>
                <a th:classappend="${activePage == 'transactions'} ? 'active' : ''"
                   th:href="@{/transactions}" class="list-group-item list-group-item-action">
                    <i class="bi bi-cash-stack"></i> Lançamentos
                </a>
                <a th:classappend="${activePage == 'statement'} ? 'active' : ''"
                   th:href="@{/statement}" class="list-group-item list-group-item-action">
                    <i class="bi bi-receipt"></i> Extrato
                </a>
                <a th:classappend="${activePage == 'invoices'} ? 'active' : ''"
                   th:href="@{/invoices}" class="list-group-item list-group-item-action">
                    <i class="bi bi-credit-card"></i> Faturas
                </a>
                <a th:classappend="${activePage == 'budget'} ? 'active' : ''"
                   th:href="@{/budget}" class="list-group-item list-group-item-action">
                    <i class="bi bi-bullseye"></i> Planejamento
                </a>
                <a th:classappend="${activePage == 'settings'} ? 'active' : ''"
                   th:href="@{/settings}" class="list-group-item list-group-item-action">
                    <i class="bi bi-gear-fill"></i> Configurações
                </a>
                <a th:classappend="${activePage == 'import-export'} ? 'active' : ''"
                   th:href="@{/import-export}" class="list-group-item list-group-item-action">
                    <i class="bi bi-folder"></i> Importar/Exportar
                </a>
            </nav>
            <div class="mt-auto p-3 border-top border-secondary" sec:authorize="isAuthenticated()">
                <small class="text-secondary d-block mb-1" sec:authentication="name"></small>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-secondary btn-sm w-100">
                        <i class="bi bi-box-arrow-right"></i> Sair
                    </button>
                </form>
            </div>
        </div>

        <div id="page-content-wrapper">
            <div class="container-fluid p-4">
                <th:block layout:fragment="content">
                    <p>Placeholder — override in child template.</p>
                </th:block>
            </div>
        </div>
    </div>

    <!-- Toast container for Alpine.js notifications with pause-on-hover -->
    <div class="toast-container" x-data="{
        toasts: [],
        add(detail) {
            let t = { id: Date.now() + Math.random(), ...detail };
            t.timer = setTimeout(() => { this.toasts = this.toasts.filter(x => x.id !== t.id); }, 5000);
            this.toasts.push(t);
        },
        pause(t) { clearTimeout(t.timer); },
        resume(t) { t.timer = setTimeout(() => { this.toasts = this.toasts.filter(x => x.id !== t.id); }, 5000); }
    }" @notify.window="add($event.detail)">
        <template x-for="t in toasts" :key="t.id">
            <div class="toast show" :class="'toast-' + (t.type || 'info')" role="alert"
                 @mouseenter="pause(t)" @mouseleave="resume(t)">
                <div class="toast-body d-flex align-items-center gap-2">
                    <i :class="'bi bi-' + (t.icon || 'info-circle') + ' fs-5'"></i>
                    <span x-text="t.message"></span>
                    <button type="button" class="btn-close ms-auto" @click="toasts = toasts.filter(x => x.id !== t.id); clearTimeout(t.timer)"></button>
                </div>
            </div>
        </template>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
